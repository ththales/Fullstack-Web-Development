<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Box Model</title>
  <style>
    /* Write your CSS code here */
    /* 2. Set their sizes to 200px heigh by 200px wide. */
    div {
      height: 200px;
      width: 200px;
    }

    /* 3. Set different background colors for each of the boxes (I used cadetblue, gold and indianred). */
    #box-01 {
      background-color: cadetblue;
      /* 5. Set the 1st div to have 20px padding all around with a black 10px border. */
      padding: 20px;
      border: 10px solid black;
    }
    #box-02 {
      background-color: gold;
      /* 7. Set the 2nd div to have a 20px border on top and bottom and 10px border left and right. (See goal image) */
      border: solid black;
      border-width: 20px 10px;

      /* 9. Set the margins for the divs so that each box corner touches the other. (See the goal image) */
      margin-left: 260px;
    }
    #box-03 {
      background-color: indianred;
      /* 8. Set the 3rd div to have a 10px border  */
      border: 10px solid black;
      /* 9. Set the margins for the divs so that each box corner touches the other. (See the goal image) */
      margin-left: 40px;
    }

    /* 6. Fix the style of the <p> element to remove all margins. Hint: Use the CSS inspector in Chrome. */
    p {
      margin: 0px;
    }
  </style>
</head>

<body>
  <!-- 1. Create 3 Boxes using the div element. -->
  <!-- 4. Add a paragraph <p> element into the first div and add the following words-->
  <div id="box-01">
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Aliquam at sapien porttitor urna elementum lacinia. Inid magna pulvinar, ultricies lorem id, vehicula elit. Aliquam eu luctus nisl, vitae pellentesque magna. Phasellus dolor metus, laoreet ac convallis sit amet, efficitur sed dolor.</p>
  </div>
  <div id="box-02"></div>
  <div id="box-03"></div>
</body>

</html>
